# =============================================================================
# AuraNet V3 Configuration
# =============================================================================

audio:
  sample_rate: 16000

stft:
  window_size: 160    # 10ms @ 16kHz
  hop_size: 80        # 5ms (50% overlap)
  n_fft: 256          # 129 frequency bins

model:
  encoder:
    channels: [16, 32, 64, 128]
  decoder:
    channels: [128, 64, 32, 16, 2]
  bottleneck:
    hidden_size: 128   # V3: smaller hidden, more layers
    num_layers: 2       # V3: 2-layer GRU
    dropout: 0.1

loss:
  si_snr: 1.0              # Primary: perceptual quality driver
  compressed_mse: 0.3      # Power-law compressed complex MSE (reduced)
  multi_res_stft: 0.2      # Multi-resolution spectral matching (reduced)
  compress_factor: 0.3     # Power compression exponent
  energy: 0.1              # Energy preservation (prevents softness)
  logmel: 0.15             # Log-mel perceptual loss

training:
  batch_size: 16
  num_epochs: 100
  learning_rate: 0.001
  weight_decay: 0.01
  gradient_clip: 5.0
  warmup_epochs: 5
  lr_patience: 5           # ReduceLROnPlateau patience
  early_stop_patience: 15
  use_amp: true
  checkpoint_dir: checkpoints
  segment_length: 3.0
  num_synthetic_samples: 2000

augmentation:
  rir_prob: 0.3             # 30% get reverb (synthetic RIR: rooms, cars, offices)
  codec_prob: 0.2           # 20% get full codec chain (lowpass+resample+quantize)
  bandwidth_prob: 0.15      # 15% get standalone bandwidth limitation
  clipping_prob: 0.05       # 5% get mic clipping simulation

eval:
  metrics: [si_snr, pesq, stoi]
  pesq_every_n_epochs: 5    # PESQ/STOI computed every N epochs (expensive)

export:
  onnx:
    opset_version: 17
    dynamic_axes: true
