# =============================================================================
# AuraNet Configuration
# Auditory Universal Reflex and Analysis Network
# =============================================================================

# Audio settings
audio:
  sample_rate: 16000          # Input sample rate (Hz)
  
# STFT settings (strictly causal)
stft:
  window_size: 160            # 10ms at 16kHz
  hop_size: 80                # 5ms at 16kHz (50% overlap)
  n_fft: 256                  # FFT size
  # Output frequency bins = n_fft // 2 + 1 = 129

# Model architecture
model:
  # Encoder settings
  encoder:
    in_channels: 2            # Real + Imag
    channels: [16, 32, 64, 128]  # Channel progression
    kernel_size: [3, 3]       # [time, freq] kernel
    stride: [1, 2]            # Downsample frequency only
    
  # Temporal bottleneck (GRU)
  bottleneck:
    hidden_size: 256
    num_layers: 1
    dropout: 0.0
    
  # Decoder settings (mirrors encoder)
  decoder:
    channels: [128, 64, 32, 16, 2]  # Output 2 channels for cIRM
    kernel_size: [3, 3]
    stride: [1, 2]
    
  # Neural-WDRC sidechain
  wdrc:
    hidden_dims: [128, 64]
    output_dim: 4              # attack, release, ratio, gain

# Loss function weights
loss:
  complex_mse: 1.0
  multi_resolution_stft: 0.5
  loudness_envelope: 0.3
  temporal_coherence: 0.2
  
  # Multi-resolution STFT loss settings
  stft_loss:
    fft_sizes: [512, 1024, 2048]
    hop_sizes: [50, 120, 240]
    win_lengths: [240, 600, 1200]

# Training settings
training:
  batch_size: 16
  num_epochs: 100
  learning_rate: 0.0001    # FIXED: 1e-4 for perceptual fine-tuning
  weight_decay: 0.01
  lr_scheduler: "cosine"      # cosine, step, plateau
  warmup_epochs: 5
  gradient_clip: 3.0       # FIXED: reduced for stability
  
  # Mixed precision training
  use_amp: true
  
  # Quantization-aware training
  qat:
    enabled: false
    start_epoch: 50           # Start QAT after this epoch
    
  # Checkpointing
  save_every_n_epochs: 5
  checkpoint_dir: "checkpoints"

# Data settings
data:
  # Training data paths (placeholder - customize for your dataset)
  train_clean_dir: "data/train/clean"
  train_noise_dir: "data/train/noise"
  val_clean_dir: "data/val/clean"
  val_noise_dir: "data/val/noise"
  
  # Data augmentation
  snr_range: [-5, 20]         # SNR range in dB for mixing
  segment_length: 3.0         # Audio segment length in seconds
  
  # DataLoader
  num_workers: 4
  pin_memory: true

# Inference settings
inference:
  chunk_size_ms: 10           # Process in 10ms chunks for real-time
  overlap_ratio: 0.5          # 50% overlap for overlap-add

# Export settings
export:
  onnx_opset: 14
  quantize_int8: true
  output_dir: "exported_models"
